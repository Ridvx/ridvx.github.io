<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hit Me Up - ridvxvisual</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #050508; 
            overflow-x: hidden; 
            font-family: Arial, sans-serif; 
            color: #ffffff;
        }
        canvas { 
            display: block; 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: 1; 
        }

        /* CONTAINER UTAMA (Ukuran diperkecil & lebih compact) */
        .contact-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            pointer-events: none;
        }

        .contact-card {
            background: rgba(10, 10, 15, 0.6);
            border: 1px solid rgba(255, 26, 26, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 30px 28px;
            width: 100%;
            max-width: 420px; /* Ukuran kotak dibuat lebih kecil */
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 15px rgba(255, 26, 26, 0.15);
            pointer-events: auto;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .contact-card:hover {
            border-color: rgba(255, 26, 26, 0.7);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), 0 0 25px rgba(255, 26, 26, 0.3);
        }

        .contact-card h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: #ffffff;
            margin-bottom: 24px;
            text-shadow: 0 0 10px rgba(255, 26, 26, 0.6);
            text-align: center;
        }

        /* FORM INPUT */
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            color: #ddd;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            color: #ffffff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #ff1a1a;
            box-shadow: 0 0 10px rgba(255, 26, 26, 0.5);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 90px;
        }

        /* TOMBOL SUBMIT */
        .submit-btn {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: transparent;
            border: 1px solid #ff1a1a;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 8px rgba(255, 26, 26, 0.8);
            box-shadow: 0 0 10px rgba(255, 26, 26, 0.2);
        }

        .submit-btn:hover {
            background: #ff1a1a;
            color: #ffffff;
            box-shadow: 0 0 20px #ff1a1a;
            transform: translateY(-2px);
        }

        /* SOCIAL LINKS FOOTER */
        .social-links {
            margin-top: 25px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .social-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            color: #ff1a1a;
            text-shadow: 0 0 10px #ff1a1a;
        }

        /* NAVIGASI BACK */
        .back-nav {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 20;
        }

        .back-nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(255, 26, 26, 0.8);
            transition: all 0.3s ease;
        }

        .back-nav a:hover {
            color: #ff1a1a;
            text-shadow: 0 0 15px #ff1a1a;
        }
    </style>
</head>
<body>

    <!-- Tombol Kembali -->
    <div class="back-nav">
        <a href="/">&larr; BACK</a>
    </div>

    <!-- Container Form Kontak -->
    <div class="contact-container">
        <div class="contact-card">
            <h1>HIT ME UP</h1>

            <form onsubmit="event.preventDefault(); alert('Pesan berhasil terkirim!');">
                <div class="form-group">
                    <label>NAME</label>
                    <input type="text" placeholder="Nama Lengkap" required>
                </div>

                <div class="form-group">
                    <label>EMAIL</label>
                    <input type="email" placeholder="alamat@email.com" required>
                </div>

                <div class="form-group">
                    <label>MESSAGE</label>
                    <textarea placeholder="Tuliskan pesanmu di sini..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">SEND</button>
            </form>

            <div class="social-links">
                <a href="https://github.com" target="_blank">GITHUB</a>
                <a href="https://linkedin.com" target="_blank">LINKEDIN</a>
                <a href="https://instagram.com" target="_blank">INSTAGRAM</a>
            </div>
        </div>
    </div>

    <!-- Import Three.js & OrbitControls via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        camera.position.z = 22;

        function createPointTexture(colorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, colorHex);
            gradient.addColorStop(0.3, colorHex);
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);

            return new THREE.CanvasTexture(canvas);
        }

        const whiteTexture = createPointTexture('rgba(255, 255, 255, 1)');
        const redTexture = createPointTexture('rgba(255, 26, 26, 1)');

        const particleCount = 130;
        const particlesData = [];
        const particleGroup = new THREE.Group();
        scene.add(particleGroup);

        for (let i = 0; i < particleCount; i++) {
            const isRedNode = (i % 12 === 0);

            const material = new THREE.SpriteMaterial({
                map: isRedNode ? redTexture : whiteTexture,
                transparent: true,
                opacity: 0.5 + Math.random() * 0.5,
                blending: THREE.AdditiveBlending
            });

            const sprite = new THREE.Sprite(material);
            const scaleSize = isRedNode ? 0.7 : 0.4;
            sprite.scale.set(scaleSize, scaleSize, 1.0);

            const posX = (Math.random() - 0.5) * 34;
            const posY = (Math.random() - 0.5) * 24;
            const posZ = (Math.random() - 0.5) * 16;

            sprite.position.set(posX, posY, posZ);
            particleGroup.add(sprite);

            particlesData.push({
                mesh: sprite,
                basePos: new THREE.Vector3(posX, posY, posZ),
                velocity: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.015,
                    (Math.random() - 0.5) * 0.015,
                    (Math.random() - 0.5) * 0.015
                ),
                alphaSpeed: (Math.random() - 0.5) * 0.008,
                isRed: isRedNode
            });
        }

        const maxLines = particleCount * particleCount;
        const positions = new Float32Array(maxLines * 6);
        const colors = new Float32Array(maxLines * 6);

        const linesGeometry = new THREE.BufferGeometry();
        linesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        linesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const linesMaterial = new THREE.LineBasicMaterial({
            vertexColors: true,
            transparent: true,
            opacity: 0.7,
            blending: THREE.AdditiveBlending
        });

        const linesMesh = new THREE.LineSegments(linesGeometry, linesMaterial);
        particleGroup.add(linesMesh);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-9999, -9999);
        const mouse3D = new THREE.Vector3(-9999, -9999, -9999);
        const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(plane, mouse3D);
        });

        window.addEventListener('mouseleave', () => {
            mouse3D.set(-9999, -9999, -9999);
        });

        function animate() {
            requestAnimationFrame(animate);

            controls.update();

            let vertexIndex = 0;
            let colorIndex = 0;

            for (let i = 0; i < particleCount; i++) {
                const p = particlesData[i];

                p.mesh.material.opacity += p.alphaSpeed;
                if (p.mesh.material.opacity >= 1.0 || p.mesh.material.opacity <= 0.3) {
                    p.alphaSpeed = -p.alphaSpeed;
                }

                p.basePos.add(p.velocity);
                if (Math.abs(p.basePos.x) > 18) p.velocity.x *= -1;
                if (Math.abs(p.basePos.y) > 13) p.velocity.y *= -1;
                if (Math.abs(p.basePos.z) > 9) p.velocity.z *= -1;

                const distToMouse = p.mesh.position.distanceTo(mouse3D);
                const pushRadius = 7;

                if (distToMouse < pushRadius) {
                    const force = (pushRadius - distToMouse) / pushRadius;
                    const dir = p.mesh.position.clone().sub(mouse3D).normalize();
                    p.mesh.position.add(dir.multiplyScalar(force * 0.35));
                } else {
                    p.mesh.position.lerp(p.basePos, 0.05);
                }

                for (let j = i + 1; j < particleCount; j++) {
                    const p2 = particlesData[j];
                    const dist = p.mesh.position.distanceTo(p2.mesh.position);
                    const connectDistance = 5.2;

                    if (dist < connectDistance) {
                        const alpha = (1.0 - dist / connectDistance) * 0.7;

                        positions[vertexIndex++] = p.mesh.position.x;
                        positions[vertexIndex++] = p.mesh.position.y;
                        positions[vertexIndex++] = p.mesh.position.z;

                        positions[vertexIndex++] = p2.mesh.position.x;
                        positions[vertexIndex++] = p2.mesh.position.y;
                        positions[vertexIndex++] = p2.mesh.position.z;

                        const isRedLine = p.isRed || p2.isRed;
                        colors[colorIndex++] = isRedLine ? alpha : alpha * 0.8;
                        colors[colorIndex++] = isRedLine ? alpha * 0.1 : alpha * 0.8;
                        colors[colorIndex++] = isRedLine ? alpha * 0.1 : alpha * 0.8;

                        colors[colorIndex++] = isRedLine ? alpha : alpha * 0.8;
                        colors[colorIndex++] = isRedLine ? alpha * 0.1 : alpha * 0.8;
                        colors[colorIndex++] = isRedLine ? alpha * 0.1 : alpha * 0.8;
                    }
                }
            }

            linesGeometry.attributes.position.needsUpdate = true;
            linesGeometry.attributes.color.needsUpdate = true;
            linesGeometry.setDrawRange(0, vertexIndex / 3);

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
