<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Loops - Visual Assets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #050508; 
            overflow-x: hidden; 
            font-family: Arial, sans-serif; 
            color: #ffffff;
        }

        /* CANVAS LATAR BELAKANG FIXED */
        canvas { 
            display: block; 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: 1; 
            pointer-events: none;
        }

        /* NAVIGASI BACK */
        .back-nav {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 20;
        }
        .back-nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(255, 26, 26, 0.8);
            transition: all 0.3s ease;
        }
        .back-nav a:hover {
            color: #ff1a1a;
            text-shadow: 0 0 15px #ff1a1a;
        }

        /* CONTAINER KONTEN UTAMA */
        .content-container {
            position: relative;
            z-index: 10;
            padding: 100px 40px 60px;
            min-height: 100vh;
            max-width: 1800px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
            pointer-events: none;
        }
        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 26, 26, 0.6);
        }
        .page-header p {
            color: #aaa;
            margin-top: 10px;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        /* GRID VIDEO GALLERY */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 Kolom Sejajar */
            gap: 24px;
            pointer-events: auto;
        }

        /* KARTU VIDEO (GLASSMORPHISM) */
        .video-card {
            background: rgba(10, 10, 15, 0.55);
            border: 1px solid rgba(255, 26, 26, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 26, 26, 0.8);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 26, 26, 0.3);
        }

        /* WRAPPER VIDEO ASLI */
        .thumbnail-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Rasio 16:9 */
            background: #000;
            cursor: pointer;
            overflow: hidden;
        }
        
        .custom-thumbnail {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        /* Tombol Play Murni CSS */
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: rgba(10, 10, 15, 0.6);
            border: 2px solid #ff1a1a;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(255, 26, 26, 0.3);
            transition: all 0.3s ease;
            z-index: 2;
        }

        /* Segitiga Play */
        .play-button::after {
            content: '';
            width: 0;
            height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 14px solid #ff1a1a;
            margin-left: 4px;
            transition: all 0.3s ease;
        }

        /* Efek Hover */
        .video-card:hover .custom-thumbnail {
            transform: scale(1.08);
            opacity: 0.6;
        }
        .video-card:hover .play-button {
            background: #ff1a1a;
            box-shadow: 0 0 25px #ff1a1a;
            transform: translate(-50%, -50%) scale(1.1);
        }
        .video-card:hover .play-button::after {
            border-left-color: #ffffff;
        }

        /* Kelas untuk menyembunyikan tombol play setelah video diputar */
        .playing .play-button {
            opacity: 0;
            pointer-events: none;
        }

        /* INFO & TOMBOL KARTU */
        .video-info {
            padding: 16px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .video-info h3 {
            font-size: 0.95rem;
            color: #fff;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
        }
        .download-btn {
            display: inline-block;
            padding: 8px 12px;
            background: transparent;
            border: 1px solid #ff1a1a;
            color: #ff1a1a;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            background: #ff1a1a;
            color: #fff;
            box-shadow: 0 0 12px #ff1a1a;
        }

        /* RESPONSIVE BREAKPOINTS */
        @media (max-width: 1200px) {
            .video-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr; /* 1 Kolom untuk HP */
            }
            .content-container {
                padding: 80px 20px 40px;
            }
        }
    </style>
</head>
<body>

    <!-- Tombol Kembali -->
    <div class="back-nav">
        <a href="/">&larr; BACK</a>

    <!-- Konten Utama Galeri Video -->
    <div class="content-container">

                <div class="thumbnail-wrapper" onclick="togglePlay(this)">
                    <video src="video4.mp4" class="custom-thumbnail" loop muted playsinline></video>

        </div>
    </div>

    <!-- Script Interaktif Play/Pause Video (Auto-Pause yang Lain) -->
    <script>
        function togglePlay(wrapper) {
            const currentVideo = wrapper.querySelector('video');

            // 1. Matikan/pause semua video lain yang sedang berputar di halaman
            document.querySelectorAll('.thumbnail-wrapper').forEach(item => {
                const video = item.querySelector('video');
                if (video !== currentVideo && !video.paused) {
                    video.pause();
                    item.classList.remove('playing');
                }
            });

            // 2. Play atau Pause video yang sedang diklik
            if (currentVideo.paused) {
                currentVideo.play();
                wrapper.classList.add('playing');
            } else {
                currentVideo.pause();
                wrapper.classList.remove('playing');
            }
        }
    </script>

    <!-- Import Three.js & OrbitControls untuk Background 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = false; 
        camera.position.z = 22;

        function createPointTexture(colorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, colorHex);
            gradient.addColorStop(0.3, colorHex);
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        const whiteTexture = createPointTexture('rgba(255, 255, 255, 1)');
        const redTexture = createPointTexture('rgba(255, 26, 26, 1)');

        const particleCount = 130;
        const particlesData = [];
        const particleGroup = new THREE.Group();
        scene.add(particleGroup);

        for (let i = 0; i < particleCount; i++) {
            const isRedNode = (i % 12 === 0);

            const material = new THREE.SpriteMaterial({
                map: isRedNode ? redTexture : whiteTexture,
                transparent: true,
                opacity: 0.4 + Math.random() * 0.4,
                blending: THREE.AdditiveBlending
            });

            const sprite = new THREE.Sprite(material);
            const scaleSize = isRedNode ? 0.7 : 0.4;
            sprite.scale.set(scaleSize, scaleSize, 1.0);

            const posX = (Math.random() - 0.5) * 34;
            const posY = (Math.random() - 0.5) * 24;
            const posZ = (Math.random() - 0.5) * 16;

            sprite.position.set(posX, posY, posZ);
            particleGroup.add(sprite);

            particlesData.push({
                mesh: sprite,
                basePos: new THREE.Vector3(posX, posY, posZ),
                velocity: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.015,
                    (Math.random() - 0.5) * 0.015,
                    (Math.random() - 0.5) * 0.015
                ),
                alphaSpeed: (Math.random() - 0.5) * 0.008,
                isRed: isRedNode
            });
        }

        const maxLines = particleCount * particleCount;
        const positions = new Float32Array(maxLines * 6);
        const colors = new Float32Array(maxLines * 6);

        const linesGeometry = new THREE.BufferGeometry();
        linesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        linesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const linesMaterial = new THREE.LineBasicMaterial({
            vertexColors: true,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });

        const linesMesh = new THREE.LineSegments(linesGeometry, linesMaterial);
        particleGroup.add(linesMesh);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-9999, -9999);
        const mouse3D = new THREE.Vector3(-9999, -9999, -9999);
        const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(plane, mouse3D);
        });

        window.addEventListener('mouseleave', () => {
            mouse3D.set(-9999, -9999, -9999);
        });

        function animate() {
            requestAnimationFrame(animate);

            controls.update();

            let vertexIndex = 0;
            let colorIndex = 0;

            for (let i = 0; i < particleCount; i++) {
                const p = particlesData[i];

                p.mesh.material.opacity += p.alphaSpeed;
                if (p.mesh.material.opacity >= 0.8 || p.mesh.material.opacity <= 0.2) {
                    p.alphaSpeed = -p.alphaSpeed;
                }

                p.basePos.add(p.velocity);
                if (Math.abs(p.basePos.x) > 18) p.velocity.x *= -1;
                if (Math.abs(p.basePos.y) > 13) p.velocity.y *= -1;
                if (Math.abs(p.basePos.z) > 9) p.velocity.z *= -1;

                const distToMouse = p.mesh.position.distanceTo(mouse3D);
                const pushRadius = 7;

                if (distToMouse < pushRadius) {
                    const force = (pushRadius - distToMouse) / pushRadius;
                    const dir = p.mesh.position.clone().sub(mouse3D).normalize();
                    p.mesh.position.add(dir.multiplyScalar(force * 0.35));
                } else {
                    p.mesh.position.lerp(p.basePos, 0.05);
                }

                for (let j = i + 1; j < particleCount; j++) {
                    const p2 = particlesData[j];
                    const dist = p.mesh.position.distanceTo(p2.mesh.position);
                    const connectDistance = 5.2;

                    if (dist < connectDistance) {
                        const alpha = (1.0 - dist / connectDistance) * 0.6;

                        positions[vertexIndex++] = p.mesh.position.x;
                        positions[vertexIndex++] = p.mesh.position.y;
                        positions[vertexIndex++] = p.mesh.position.z;

                        positions[vertexIndex++] = p2.mesh.position.x;
                        positions[vertexIndex++] = p2.mesh.position.y;
                        positions[vertexIndex++] = p2.mesh.position.z;

                        const isRedLine = p.isRed || p2.isRed;
                        colors[colorIndex++] = isRedLine ? alpha : alpha * 0.8;
                        colors[colorIndex++] = isRedLine ? alpha * 0.1 : alpha * 0.8;
                        colors[colorIndex++] = isRedLine ? alpha * 0.1 : alpha * 0.8;

                        colors[colorIndex++] = isRedLine ? alpha : alpha * 0.8;
                        colors[colorIndex++] = isRedLine ? alpha * 0.1 : alpha * 0.8;
                        colors[colorIndex++] = isRedLine ? alpha * 0.1 : alpha * 0.8;
                    }
                }
            }

            linesGeometry.attributes.position.needsUpdate = true;
            linesGeometry.attributes.color.needsUpdate = true;
            linesGeometry.setDrawRange(0, vertexIndex / 3);

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
