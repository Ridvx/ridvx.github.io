<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Blood Red Morphing - Three.js</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #050505; /* Background hitam pekat agar warna merah darah lebih menonjol */
            font-family: Arial, sans-serif;
            user-select: none;
        }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #ff4d4d;
            font-size: 18px;
            pointer-events: none;
            text-shadow: 0px 2px 10px rgba(139, 0, 0, 0.8);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="info">Ketuk KUBUS untuk memecahkannya! (Geser layar untuk memutar sudut 3D)</div>

    <!-- Import Three.js dan OrbitControls via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 1. SETUP SCENE, CAMERA, & RENDERER
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. TAMBAHKAN ORBIT CONTROLS (AGAR BISA DIGESER 3D-NYA)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Rotasi terasa halus/halus saat digeser
        controls.dampingFactor = 0.05;

        // PENCAHAYAAN
        const ambientLight = new THREE.AmbientLight(0x330000, 0.8); // Cahaya redup merah
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xff1a1a, 1.5, 50); // Cahaya sorot merah terang
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        const fillLight = new THREE.PointLight(0x800000, 1, 50);
        fillLight.position.set(-10, -10, -10);
        scene.add(fillLight);

        // WARNA MERAH DARAH (HEX)
        const bloodRedColor = 0x8b0000;
        const darkBloodColor = 0x550000;

        // 3. OBJEK KUBUS UTAMA (MERAH DARAH)
        const cubeGeo = new THREE.BoxGeometry(2, 2, 2);
        const cubeMat = new THREE.MeshStandardMaterial({ 
            color: bloodRedColor, 
            roughness: 0.2, 
            metalness: 0.3 
        });
        let mainCube = new THREE.Mesh(cubeGeo, cubeMat);
        scene.add(mainCube);

        // 4. OBJEK LOW POLY SPHERE (MERAH DARAH)
        const sphereGeo = new THREE.IcosahedronGeometry(1.5, 1);
        const sphereMat = new THREE.MeshStandardMaterial({ 
            color: bloodRedColor, 
            flatShading: true, // Efek pecahan/muka datar Low Poly
            roughness: 0.1,
            metalness: 0.4
        });
        const lowPolySphere = new THREE.Mesh(sphereGeo, sphereMat);
        lowPolySphere.visible = false;
        scene.add(lowPolySphere);

        camera.position.z = 6;

        // Vektor Skala
        const scaleOne = new THREE.Vector3(1, 1, 1);
        const scaleZero = new THREE.Vector3(0, 0, 0);

        let state = 'CUBE'; 
        let smallCubes = [];
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Variabel untuk membedakan antara "drag/geser camera" dan "klik/ketuk"
        let isDragging = false;
        window.addEventListener('mousedown', () => isDragging = false);
        window.addEventListener('mousemove', () => isDragging = true);

        // 5. INTERAKSI KLIK / TOUCH
        window.addEventListener('pointerup', (event) => {
            // Jika user sedang menggeser 3D (drag), jangan picu animasi pecah/morph
            if (isDragging) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            if (state === 'CUBE') {
                const intersects = raycaster.intersectObject(mainCube);
                if (intersects.length > 0) explodeCube();
            } 
            else if (state === 'EXPLODED') {
                const intersects = raycaster.intersectObjects(smallCubes);
                if (intersects.length > 0) mergeCubes();
            }
            else if (state === 'SPHERE') {
                const intersects = raycaster.intersectObject(lowPolySphere);
                if (intersects.length > 0) morphToCube();
            }
        });

        // FUNGSI 1: MELEDAK
        function explodeCube() {
            state = 'EXPLODED';
            mainCube.visible = false;
            document.getElementById('info').innerText = "Ketuk pecahan untuk morphing menjadi bola merah!";

            const count = 7;
            const radius = 2.2;

            for (let i = 0; i < count; i++) {
                const smallGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
                // Kombinasi variasi warna merah darah pada pecahan
                const smallMat = new THREE.MeshStandardMaterial({ 
                    color: (i % 2 === 0) ? bloodRedColor : darkBloodColor,
                    roughness: 0.2
                });
                const cube = new THREE.Mesh(smallGeo, smallMat);

                const angle = (i / count) * Math.PI * 2;
                cube.position.set(0, 0, 0);
                cube.scale.copy(scaleOne);

                cube.userData = {
                    targetPos: new THREE.Vector3(Math.cos(angle) * radius, Math.sin(angle) * radius, 0),
                    rotSpeed: { x: (Math.random() - 0.5) * 0.05, y: (Math.random() - 0.5) * 0.05 }
                };

                scene.add(cube);
                smallCubes.push(cube);
            }
        }

        // FUNGSI 2: MENYATU
        function mergeCubes() {
            state = 'MERGING';
            document.getElementById('info').innerText = "Morphing...";
            smallCubes.forEach(cube => {
                cube.userData.targetPos = new THREE.Vector3(0, 0, 0);
            });
        }

        // FUNGSI 3: MORPHING KEMBALI KE KUBUS
        function morphToCube() {
            state = 'MORPH_TO_CUBE';
            document.getElementById('info').innerText = "Berubah kembali menjadi kubus!";
            mainCube.scale.copy(scaleZero);
            mainCube.visible = true;
        }

        // 6. ANIMASI (LOOP)
        function animate() {
            requestAnimationFrame(animate);

            // Update pergerakan kamera dari OrbitControls
            controls.update();

            if (state === 'CUBE') {
                mainCube.rotation.x += 0.005;
                mainCube.rotation.y += 0.005;
            } 
            else if (state === 'EXPLODED') {
                smallCubes.forEach(cube => {
                    cube.position.lerp(cube.userData.targetPos, 0.08);
                    cube.rotation.x += cube.userData.rotSpeed.x;
                    cube.rotation.y += cube.userData.rotSpeed.y;
                });
            } 
            else if (state === 'MERGING') {
                let readyToMorph = true;
                smallCubes.forEach(cube => {
                    cube.position.lerp(cube.userData.targetPos, 0.1);
                    cube.rotation.x += 0.05;
                    cube.rotation.y += 0.05;
                    if (cube.position.distanceTo(scaleZero) > 0.1) readyToMorph = false;
                });

                if (readyToMorph) {
                    state = 'MORPH_TO_SPHERE';
                    lowPolySphere.scale.copy(scaleZero);
                    lowPolySphere.visible = true;
                }
            }
            else if (state === 'MORPH_TO_SPHERE') {
                lowPolySphere.scale.lerp(scaleOne, 0.15);
                lowPolySphere.rotation.x += 0.05;
                lowPolySphere.rotation.y += 0.05;

                smallCubes.forEach(cube => {
                    cube.scale.lerp(scaleZero, 0.2);
                });

                if (lowPolySphere.scale.x > 0.99) {
                    lowPolySphere.scale.copy(scaleOne);
                    smallCubes.forEach(c => scene.remove(c));
                    smallCubes = [];
                    state = 'SPHERE';
                    document.getElementById('info').innerText = "Ketuk BOLA untuk mengembalikannya menjadi KUBUS!";
                }
            }
            else if (state === 'SPHERE') {
                lowPolySphere.rotation.x += 0.005;
                lowPolySphere.rotation.y += 0.008;
            }
            else if (state === 'MORPH_TO_CUBE') {
                mainCube.scale.lerp(scaleOne, 0.15);
                mainCube.rotation.x += 0.05;
                mainCube.rotation.y += 0.05;

                lowPolySphere.scale.lerp(scaleZero, 0.15);
                lowPolySphere.rotation.x += 0.05;
                lowPolySphere.rotation.y += 0.05;

                if (mainCube.scale.x > 0.99) {
                    mainCube.scale.copy(scaleOne);
                    lowPolySphere.visible = false;
                    state = 'CUBE';
                    document.getElementById('info').innerText = "Ketuk KUBUS untuk memecahkannya!";
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
