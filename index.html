<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ridvx Visual</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #050508; 
            overflow: hidden; 
            font-family: Arial, sans-serif; 
            user-select: none;
            cursor: pointer;
        }
        canvas { display: block; }
        
        .node-link {
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-decoration: none;
            background: transparent;
            border: none;
            padding: 0;
            transition: all 0.3s ease;
            cursor: pointer;
            white-space: nowrap;
            text-shadow: 0 0 8px rgba(255, 26, 26, 0.6);
        }

        .node-link:hover {
            color: #ff1a1a;
            text-shadow: 
                0 0 5px #ff1a1a,
                0 0 10px #ff1a1a,
                0 0 20px #ff0000,
                0 0 30px #ff0000,
                0 0 40px #b30000;
            transform: scale(1.2);
        }
    </style>
</head>
<body>

    <!-- CDN Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>

    <script>
        // ==========================================
        // 1. INSTANT UNLOCK AUDIO ENGINE
        // ==========================================
        let audioCtx = null;
        let isAudioUnlocked = false;

        function unlockAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            if (!isAudioUnlocked && audioCtx.state === 'running') {
                isAudioUnlocked = true;
                // Bunyi pemicu pertama (Volume dinaikkan lagi = 0.32)
                playTone(440, 0.2, 'sawtooth');
            }
        }

        // Event listener interaksi untuk unlock audio browser
        ['click', 'mousedown', 'mouseup', 'keydown', 'touchstart', 'mousemove'].forEach(eventType => {
            window.addEventListener(eventType, unlockAudio, { once: false });
        });

        // FUNGSI SUARA TECHNO (VOLUME DI-BOOST LAGI 2X LIPAT DARI SEBELUMNYA)
        function playTone(freq, duration = 0.12, type = 'sine') {
            if (!audioCtx || audioCtx.state !== 'running') return;

            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

                // Volume dinaikkan dari 0.16 menjadi 0.32 (Sangat Keras)
                gain.gain.setValueAtTime(0.32, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.log(e);
            }
        }

        // ==========================================
        // 2. THREE.JS SCENE SETUP
        // ==========================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new THREE.CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        camera.position.z = 24;

        function createPointTexture(colorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, colorHex);
            gradient.addColorStop(0.3, colorHex);
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);

            return new THREE.CanvasTexture(canvas);
        }

        const whiteTexture = createPointTexture('rgba(255, 255, 255, 1)');
        const redTexture = createPointTexture('rgba(255, 26, 26, 1)');

        // JANGAN LUPA GANTI URL CONTACT KE FOLDER /contact/
        const linkData = [
            { name: "PORTFOLIO", url: "#" },
            { name: "ABOUT ME", url: "#" },
            { name: "PROJECTS", url: "#" },
            { name: "SERVICES", url: "#" },
            { name: "SKILLS", url: "#" },
            { name: "EXPERIENCES", url: "#" },
            { name: "CONTACT", url: "/contact/" } 
        ];

        const particleCount = 140;
        const particlesData = [];
        const particleGroup = new THREE.Group();
        scene.add(particleGroup);

        for (let i = 0; i < particleCount; i++) {
            const isLinkNode = (i < 7);

            const material = new THREE.SpriteMaterial({
                map: isLinkNode ? redTexture : whiteTexture,
                transparent: true,
                opacity: 0.6 + Math.random() * 0.4,
                blending: THREE.AdditiveBlending
            });

            const sprite = new THREE.Sprite(material);
            const scaleSize = isLinkNode ? 0.8 : 0.45;
            sprite.scale.set(scaleSize, scaleSize, 1.0);

            const posX = (Math.random() - 0.5) * 32;
            const posY = (Math.random() - 0.5) * 22;
            const posZ = (Math.random() - 0.5) * 16;

            sprite.position.set(posX, posY, posZ);

            if (isLinkNode) {
                const a = document.createElement('a');
                a.className = 'node-link';
                a.href = linkData[i].url;
                a.innerText = linkData[i].name;
                a.style.pointerEvents = 'auto';

                // Bunyi saat kursor menyentuh teks link (Volume Keras)
                a.addEventListener('mouseenter', () => {
                    unlockAudio();
                    const freqs = [330, 440, 554, 659, 880, 987, 1174];
                    playTone(freqs[i % freqs.length], 0.25, 'triangle');
                });

                const labelObj = new THREE.CSS2DObject(a);
                labelObj.position.set(0, 0.4, 0);
                sprite.add(labelObj);
            }

            particleGroup.add(sprite);

            particlesData.push({
                mesh: sprite,
                basePos: new THREE.Vector3(posX, posY, posZ),
                velocity: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.018,
                    (Math.random() - 0.5) * 0.018,
                    (Math.random() - 0.5) * 0.018
                ),
                alphaSpeed: (Math.random() - 0.5) * 0.008
            });
        }

        const maxLines = particleCount * particleCount;
        const positions = new Float32Array(maxLines * 6);
        const colors = new Float32Array(maxLines * 6);

        const linesGeometry = new THREE.BufferGeometry();
        linesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        linesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const linesMaterial = new THREE.LineBasicMaterial({
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const linesMesh = new THREE.LineSegments(linesGeometry, linesMaterial);
        particleGroup.add(linesMesh);

        // ==========================================
        // 3. RAYCASTER & MOUSE SOUND TRIGGER
        // ==========================================
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-9999, -9999);
        const mouse3D = new THREE.Vector3(-9999, -9999, -9999);
        const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

        let lastMoveTime = 0;

        window.addEventListener('mousemove', (e) => {
            unlockAudio();

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(plane, mouse3D);

            const now = Date.now();
            // Pemicu suara saat kursor bergerak ( Volume di fungsi playTone sudah keras)
            if (now - lastMoveTime > 140) {
                const freq = 180 + Math.abs((e.clientX + e.clientY) % 500);
                playTone(freq, 0.08, 'sine');
                lastMoveTime = now;
            }
        });

        window.addEventListener('mouseleave', () => {
            mouse3D.set(-9999, -9999, -9999);
        });

        // ==========================================
        // 4. ANIMASI LOOP
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            controls.update();

            let vertexIndex = 0;
            let colorIndex = 0;

            for (let i = 0; i < particleCount; i++) {
                const p = particlesData[i];

                p.mesh.material.opacity += p.alphaSpeed;
                if (p.mesh.material.opacity >= 1.0 || p.mesh.material.opacity <= 0.4) {
                    p.alphaSpeed = -p.alphaSpeed;
                }

                p.basePos.add(p.velocity);
                if (Math.abs(p.basePos.x) > 17) p.velocity.x *= -1;
                if (Math.abs(p.basePos.y) > 12) p.velocity.y *= -1;
                if (Math.abs(p.basePos.z) > 9) p.velocity.z *= -1;

                const distToMouse = p.mesh.position.distanceTo(mouse3D);
                const pushRadius = 7;

                if (distToMouse < pushRadius) {
                    const force = (pushRadius - distToMouse) / pushRadius;
                    const dir = p.mesh.position.clone().sub(mouse3D).normalize();
                    p.mesh.position.add(dir.multiplyScalar(force * 0.35));
                } else {
                    p.mesh.position.lerp(p.basePos, 0.05);
                }

                for (let j = i + 1; j < particleCount; j++) {
                    const p2 = particlesData[j];
                    const dist = p.mesh.position.distanceTo(p2.mesh.position);
                    const connectDistance = 5.2;

                    if (dist < connectDistance) {
                        const alpha = (1.0 - dist / connectDistance) * 0.8;

                        positions[vertexIndex++] = p.mesh.position.x;
                        positions[vertexIndex++] = p.mesh.position.y;
                        positions[vertexIndex++] = p.mesh.position.z;

                        positions[vertexIndex++] = p2.mesh.position.x;
                        positions[vertexIndex++] = p2.mesh.position.y;
                        positions[vertexIndex++] = p2.mesh.position.z;

                        const isLink = (i < 7 || j < 7);
                        colors[colorIndex++] = isLink ? alpha : alpha * 0.8;
                        colors[colorIndex++] = isLink ? alpha * 0.1 : alpha * 0.8;
                        colors[colorIndex++] = isLink ? alpha * 0.1 : alpha * 0.8;

                        colors[colorIndex++] = isLink ? alpha : alpha * 0.8;
                        colors[colorIndex++] = isLink ? alpha * 0.1 : alpha * 0.8;
                        colors[colorIndex++] = isLink ? alpha * 0.1 : alpha * 0.8;
                    }
                }
            }

            linesGeometry.attributes.position.needsUpdate = true;
            linesGeometry.attributes.color.needsUpdate = true;
            linesGeometry.setDrawRange(0, vertexIndex / 3);

            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
