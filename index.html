<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubus Pecah Melingkar - Three.js</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #111; 
            font-family: Arial, sans-serif;
        }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 18px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="info">Klik/Ketuk kubus untuk memecahkannya menjadi bentuk lingkaran!</div>

    <!-- Import Three.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. SETUP SCENE, CAMERA, & RENDERER
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Pencahayaan
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        // 2. BUAT KUBUS UTAMA
        const geometry = new THREE.BoxGeometry(2, 2, 2);
        const material = new THREE.MeshStandardMaterial({ color: 0x00ff88, roughness: 0.3 });
        let mainCube = new THREE.Mesh(geometry, material);
        scene.add(mainCube);

        camera.position.z = 6;

        let smallCubes = [];
        let isExploded = false;

        // 3. RAYCASTER UNTUK DETEKSI KLIK/KETUK
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function onClick(event) {
            if (isExploded) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(mainCube);

            if (intersects.length > 0) {
                explodeCubeInCircle();
            }
        }

        window.addEventListener('click', onClick);

        // 4. LOGIKA PECAH BERBENTUK LINGKARAN & TETAP DI SEKITAR
        function explodeCubeInCircle() {
            isExploded = true;
            
            const originPosition = mainCube.position.clone();
            scene.remove(mainCube);

            const count = 7; // Jumlah pecahan
            const radius = 2.2; // Jarak radius lingkaran (tetap di sekitar)
            const colors = [0xff5555, 0x55ff55, 0x5555ff, 0xffff55, 0xff55ff, 0x55ffff, 0xffa500];

            for (let i = 0; i < count; i++) {
                const smallGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
                const smallMat = new THREE.MeshStandardMaterial({ color: colors[i] });
                const cube = new THREE.Mesh(smallGeo, smallMat);

                // Hitung sudut lingkaran untuk tiap pecahan (dalam radian)
                const angle = (i / count) * Math.PI * 2;

                // Tentukan target posisi melingkar menggunakan Sinus & Kosinus
                const targetX = originPosition.x + Math.cos(angle) * radius;
                const targetY = originPosition.y + Math.sin(angle) * radius;
                const targetZ = originPosition.z;

                // Set posisi awal tepat di tengah sebelum bergerak mekar ke posisi lingkaran
                cube.position.copy(originPosition);

                // Simpan target posisi & rotasi untuk dianimasikan
                cube.userData = {
                    targetPosition: new THREE.Vector3(targetX, targetY, targetZ),
                    rotationSpeed: {
                        x: (Math.random() - 0.5) * 0.04,
                        y: (Math.random() - 0.5) * 0.04
                    }
                };

                scene.add(cube);
                smallCubes.push(cube);
            }

            document.getElementById('info').innerText = "Berhasil dipecahkan secara melingkar!";
        }

        // 5. ANIMASI (LOOP)
        function animate() {
            requestAnimationFrame(animate);

            if (!isExploded) {
                // Putar kubus utama saat belum diklik
                mainCube.rotation.x += 0.01;
                mainCube.rotation.y += 0.01;
            } else {
                // Animasikan pecahan kubus agar bergerak halus (lerp) menuju bentuk lingkaran
                smallCubes.forEach(cube => {
                    // lerp (linear interpolation) membuat gerakan "mekar" yang sangat halus dan berhenti di target posisi
                    cube.position.lerp(cube.userData.targetPosition, 0.08);

                    // Kubus kecil tetap berputar pelan di posisinya masing-masing
                    cube.rotation.x += cube.userData.rotationSpeed.x;
                    cube.rotation.y += cube.userData.rotationSpeed.y;
                });
            }

            renderer.render(scene, camera);
        }

        animate();

        // Responsive window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
