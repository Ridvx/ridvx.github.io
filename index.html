<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morphing 3D - Three.js</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #111; 
            font-family: Arial, sans-serif;
        }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 18px;
            pointer-events: none;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="info">Ketuk KUBUS untuk memecahkannya!</div>

    <!-- Import Three.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. SETUP SCENE, CAMERA, & RENDERER
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1.2);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        // 2. OBJEK KUBUS UTAMA
        const cubeGeo = new THREE.BoxGeometry(2, 2, 2);
        const cubeMat = new THREE.MeshStandardMaterial({ color: 0x00ff88, roughness: 0.3 });
        let mainCube = new THREE.Mesh(cubeGeo, cubeMat);
        scene.add(mainCube);

        // 3. OBJEK LOW POLY SPHERE
        const sphereGeo = new THREE.IcosahedronGeometry(1.5, 1);
        const sphereMat = new THREE.MeshStandardMaterial({ 
            color: 0xff0055, 
            flatShading: true, 
            roughness: 0.2 
        });
        const lowPolySphere = new THREE.Mesh(sphereGeo, sphereMat);
        lowPolySphere.visible = false; // Sembunyikan di awal
        scene.add(lowPolySphere);

        camera.position.z = 6;

        // Vektor Skala untuk Morphing
        const scaleOne = new THREE.Vector3(1, 1, 1);
        const scaleZero = new THREE.Vector3(0, 0, 0);

        // Status Aplikasi: 'CUBE', 'EXPLODED', 'MERGING', 'MORPH_TO_SPHERE', 'SPHERE', 'MORPH_TO_CUBE'
        let state = 'CUBE'; 
        let smallCubes = [];
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // 4. INTERAKSI KLIK
        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            if (state === 'CUBE') {
                const intersects = raycaster.intersectObject(mainCube);
                if (intersects.length > 0) explodeCube();
            } 
            else if (state === 'EXPLODED') {
                const intersects = raycaster.intersectObjects(smallCubes);
                if (intersects.length > 0) mergeCubes();
            }
            else if (state === 'SPHERE') {
                const intersects = raycaster.intersectObject(lowPolySphere);
                if (intersects.length > 0) morphToCube();
            }
        });

        // TAHAP A: MELEDAK
        function explodeCube() {
            state = 'EXPLODED';
            mainCube.visible = false;
            document.getElementById('info').innerText = "Ketuk pecahan untuk morphing menjadi bola!";

            const count = 7;
            const radius = 2.2;
            const colors = [0xff5555, 0x55ff55, 0x5555ff, 0xffff55, 0xff55ff, 0x55ffff, 0xffa500];

            for (let i = 0; i < count; i++) {
                const smallGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
                const smallMat = new THREE.MeshStandardMaterial({ color: colors[i] });
                const cube = new THREE.Mesh(smallGeo, smallMat);

                const angle = (i / count) * Math.PI * 2;
                cube.position.set(0, 0, 0);
                cube.scale.copy(scaleOne);

                cube.userData = {
                    targetPos: new THREE.Vector3(Math.cos(angle) * radius, Math.sin(angle) * radius, 0),
                    rotSpeed: { x: (Math.random() - 0.5) * 0.05, y: (Math.random() - 0.5) * 0.05 }
                };

                scene.add(cube);
                smallCubes.push(cube);
            }
        }

        // TAHAP B: MULAI MENYATU
        function mergeCubes() {
            state = 'MERGING';
            document.getElementById('info').innerText = "Morphing...";
            smallCubes.forEach(cube => {
                cube.userData.targetPos = new THREE.Vector3(0, 0, 0);
            });
        }

        // TAHAP C: KEMBALI JADI KUBUS
        function morphToCube() {
            state = 'MORPH_TO_CUBE';
            document.getElementById('info').innerText = "Berubah kembali menjadi kubus!";
            
            // Siapkan kubus utama untuk membesar dari titik nol
            mainCube.scale.copy(scaleZero);
            mainCube.visible = true;
        }

        // 5. ANIMASI (LOOP)
        function animate() {
            requestAnimationFrame(animate);

            if (state === 'CUBE') {
                mainCube.rotation.x += 0.01;
                mainCube.rotation.y += 0.01;
            } 
            else if (state === 'EXPLODED') {
                smallCubes.forEach(cube => {
                    cube.position.lerp(cube.userData.targetPos, 0.08);
                    cube.rotation.x += cube.userData.rotSpeed.x;
                    cube.rotation.y += cube.userData.rotSpeed.y;
                });
            } 
            else if (state === 'MERGING') {
                let readyToMorph = true;
                smallCubes.forEach(cube => {
                    cube.position.lerp(cube.userData.targetPos, 0.1);
                    cube.rotation.x += 0.05;
                    cube.rotation.y += 0.05;
                    if (cube.position.distanceTo(scaleZero) > 0.1) readyToMorph = false;
                });

                // Jika pecahan sudah di tengah, mulai proses morphing visual
                if (readyToMorph) {
                    state = 'MORPH_TO_SPHERE';
                    lowPolySphere.scale.copy(scaleZero);
                    lowPolySphere.visible = true;
                }
            }
            else if (state === 'MORPH_TO_SPHERE') {
                // Sphere membesar, pecahan mengecil (Visual Morphing)
                lowPolySphere.scale.lerp(scaleOne, 0.15);
                lowPolySphere.rotation.x += 0.05; // Putaran cepat saat morphing
                lowPolySphere.rotation.y += 0.05;

                smallCubes.forEach(cube => {
                    cube.scale.lerp(scaleZero, 0.2);
                });

                if (lowPolySphere.scale.x > 0.99) {
                    lowPolySphere.scale.copy(scaleOne);
                    smallCubes.forEach(c => scene.remove(c)); // Bersihkan pecahan
                    smallCubes = [];
                    state = 'SPHERE';
                    document.getElementById('info').innerText = "Ketuk bola untuk mengembalikannya menjadi KUBUS!";
                }
            }
            else if (state === 'SPHERE') {
                lowPolySphere.rotation.x += 0.01;
                lowPolySphere.rotation.y += 0.015;
            }
            else if (state === 'MORPH_TO_CUBE') {
                // Kubus membesar, Sphere mengecil
                mainCube.scale.lerp(scaleOne, 0.15);
                mainCube.rotation.x += 0.05; // Putaran cepat efek magis
                mainCube.rotation.y += 0.05;

                lowPolySphere.scale.lerp(scaleZero, 0.15);
                lowPolySphere.rotation.x += 0.05;
                lowPolySphere.rotation.y += 0.05;

                if (mainCube.scale.x > 0.99) {
                    mainCube.scale.copy(scaleOne);
                    lowPolySphere.visible = false;
                    state = 'CUBE';
                    document.getElementById('info').innerText = "Ketuk KUBUS untuk memecahkannya!";
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
