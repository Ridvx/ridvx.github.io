<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ridvx visual</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #050508; 
            overflow: hidden; 
            font-family: Arial, sans-serif; 
            user-select: none;
        }
        canvas { display: block; }
        
        /* Style Teks Murni Tanpa Shape Pembungkus */
        .node-link {
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-decoration: none;
            background: transparent;
            border: none;
            padding: 0;
            transition: all 0.3s ease;
            cursor: pointer;
            white-space: nowrap;
            /* Default Glow Merah Tipis */
            text-shadow: 0 0 8px rgba(255, 26, 26, 0.6);
        }

        /* Efek Hover: Merah Menyala Tajam */
        .node-link:hover {
            color: #ff1a1a;
            /* Multi-layer text shadow untuk pendaran merah merana yang kuat */
            text-shadow: 
                0 0 5px #ff1a1a,
                0 0 10px #ff1a1a,
                0 0 20px #ff0000,
                0 0 30px #ff0000,
                0 0 40px #b30000;
            transform: scale(1.2);
        }
    </style>
</head>
<body>

    <!-- Import Three.js, OrbitControls & CSS2DRenderer via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>

    <script>
        // 1. SETUP SCENE, CAMERA, & RENDERER
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new THREE.CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // 2. ORBIT CONTROLS
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        camera.position.z = 24;

        // 3. TEKSTUR TITIK PARTIKEL GLOW
        function createPointTexture(colorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, colorHex);
            gradient.addColorStop(0.3, colorHex);
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);

            return new THREE.CanvasTexture(canvas);
        }

        const whiteTexture = createPointTexture('rgba(255, 255, 255, 1)');
        const redTexture = createPointTexture('rgba(255, 26, 26, 1)');

        // 4. DATA 7 TITIK LINK (Tanpa Nomor)
        const linkData = [
            { name: "PORTFOLIO", url: "https://github.com" },
            { name: "ABOUT ME", url: "https://github.com" },
            { name: "PROJECTS", url: "https://github.com" },
            { name: "SERVICES", url: "https://github.com" },
            { name: "SKILLS", url: "https://github.com" },
            { name: "EXPERIENCES", url: "https://github.com" },
            { name: "CONTACT", url: "/contact/" }
        ];

        // 5. MEMBUAT TITIK-TITIK 3D DENGAN TEKS MURNI
        const particleCount = 140;
        const particlesData = [];
        const particleGroup = new THREE.Group();
        scene.add(particleGroup);

        for (let i = 0; i < particleCount; i++) {
            const isLinkNode = (i < 7);

            const material = new THREE.SpriteMaterial({
                map: isLinkNode ? redTexture : whiteTexture,
                transparent: true,
                opacity: 0.6 + Math.random() * 0.4,
                blending: THREE.AdditiveBlending
            });

            const sprite = new THREE.Sprite(material);
            const scaleSize = isLinkNode ? 0.8 : 0.45;
            sprite.scale.set(scaleSize, scaleSize, 1.0);

            const posX = (Math.random() - 0.5) * 32;
            const posY = (Math.random() - 0.5) * 22;
            const posZ = (Math.random() - 0.5) * 16;

            sprite.position.set(posX, posY, posZ);

            // Teks Murni Tanpa Box/Border
            if (isLinkNode) {
                const a = document.createElement('a');
                a.className = 'node-link';
                a.href = linkData[i].url;
               // a.target = '_blank';
                a.innerText = linkData[i].name;
                a.style.pointerEvents = 'auto';

                const labelObj = new THREE.CSS2DObject(a);
                labelObj.position.set(0, 0.4, 0); // Posisikan teks tepat di dekat titik
                sprite.add(labelObj);
            }

            particleGroup.add(sprite);

            particlesData.push({
                mesh: sprite,
                basePos: new THREE.Vector3(posX, posY, posZ),
                velocity: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.018,
                    (Math.random() - 0.5) * 0.018,
                    (Math.random() - 0.5) * 0.018
                ),
                alphaSpeed: (Math.random() - 0.5) * 0.008
            });
        }

        // 6. GARIS JARINGAN 3D
        const maxLines = particleCount * particleCount;
        const positions = new Float32Array(maxLines * 6);
        const colors = new Float32Array(maxLines * 6);

        const linesGeometry = new THREE.BufferGeometry();
        linesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        linesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const linesMaterial = new THREE.LineBasicMaterial({
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const linesMesh = new THREE.LineSegments(linesGeometry, linesMaterial);
        particleGroup.add(linesMesh);

        // 7. RAYCASTER KURSOR
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-9999, -9999);
        const mouse3D = new THREE.Vector3(-9999, -9999, -9999);
        const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(plane, mouse3D);
        });

        window.addEventListener('mouseleave', () => {
            mouse3D.set(-9999, -9999, -9999);
        });

        // 8. ANIMASI LOOP
        function animate() {
            requestAnimationFrame(animate);

            controls.update();

            let vertexIndex = 0;
            let colorIndex = 0;

            for (let i = 0; i < particleCount; i++) {
                const p = particlesData[i];

                p.mesh.material.opacity += p.alphaSpeed;
                if (p.mesh.material.opacity >= 1.0 || p.mesh.material.opacity <= 0.4) {
                    p.alphaSpeed = -p.alphaSpeed;
                }

                p.basePos.add(p.velocity);
                if (Math.abs(p.basePos.x) > 17) p.velocity.x *= -1;
                if (Math.abs(p.basePos.y) > 12) p.velocity.y *= -1;
                if (Math.abs(p.basePos.z) > 9) p.velocity.z *= -1;

                const distToMouse = p.mesh.position.distanceTo(mouse3D);
                const pushRadius = 7;

                if (distToMouse < pushRadius) {
                    const force = (pushRadius - distToMouse) / pushRadius;
                    const dir = p.mesh.position.clone().sub(mouse3D).normalize();
                    p.mesh.position.add(dir.multiplyScalar(force * 0.35));
                } else {
                    p.mesh.position.lerp(p.basePos, 0.05);
                }

                for (let j = i + 1; j < particleCount; j++) {
                    const p2 = particlesData[j];
                    const dist = p.mesh.position.distanceTo(p2.mesh.position);
                    const connectDistance = 5.2;

                    if (dist < connectDistance) {
                        const alpha = (1.0 - dist / connectDistance) * 0.8;

                        positions[vertexIndex++] = p.mesh.position.x;
                        positions[vertexIndex++] = p.mesh.position.y;
                        positions[vertexIndex++] = p.mesh.position.z;

                        positions[vertexIndex++] = p2.mesh.position.x;
                        positions[vertexIndex++] = p2.mesh.position.y;
                        positions[vertexIndex++] = p2.mesh.position.z;

                        const isLink = (i < 7 || j < 7);
                        colors[colorIndex++] = isLink ? alpha : alpha * 0.8;
                        colors[colorIndex++] = isLink ? alpha * 0.1 : alpha * 0.8;
                        colors[colorIndex++] = isLink ? alpha * 0.1 : alpha * 0.8;

                        colors[colorIndex++] = isLink ? alpha : alpha * 0.8;
                        colors[colorIndex++] = isLink ? alpha * 0.1 : alpha * 0.8;
                        colors[colorIndex++] = isLink ? alpha * 0.1 : alpha * 0.8;
                    }
                }
            }

            linesGeometry.attributes.position.needsUpdate = true;
            linesGeometry.attributes.color.needsUpdate = true;
            linesGeometry.setDrawRange(0, vertexIndex / 3);

            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
